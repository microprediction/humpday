name: Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install safety bandit

    - name: Check for security vulnerabilities
      run: |
        safety check
        bandit -r humpday/ -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json
      if: always()

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Test with optional dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[extra]"
        python -c "import humpday; print('With extra dependencies:', humpday.__version__)"

    - name: Test core-only installation
      run: |
        pip uninstall -y humpday
        pip install -e .  # Core only
        python -c "import humpday; print('Core only:', humpday.__version__)"

  performance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run performance benchmarks
      run: |
        python -c "
        import time
        from humpday import minimize_unit_cube

        def test_objective(x):
            return sum((xi - 0.5)**2 for xi in x)

        start = time.time()
        result = minimize_unit_cube(test_objective, n_dim=5, n_trials=100)
        duration = time.time() - start

        print(f'Optimization completed in {duration:.2f}s')
        print(f'Best value: {result[0]:.6f}')
        print(f'Best point: {[f\"{x:.3f}\" for x in result[1]]}')
        "

  docs-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Check README and package metadata
      run: |
        python -c "
        import pathlib
        readme = pathlib.Path('README.md')
        if readme.exists():
            content = readme.read_text()
            print(f'README.md exists ({len(content)} characters)')
        else:
            print('README.md not found')
        "

    - name: Validate pyproject.toml
      run: |
        python -m pip install --upgrade pip
        pip install validate-pyproject
        validate-pyproject pyproject.toml