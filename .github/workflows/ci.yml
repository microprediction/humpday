name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Type check with mypy
      run: |
        mypy humpday
      continue-on-error: true  # Allow to fail for now

    - name: Test with pytest
      run: |
        pytest -v --cov=humpday --cov-report=xml --cov-report=term-missing



    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  portable-contract:
    runs-on: ubuntu-latest
    name: Portable contract (pure backend)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        # Pinned to the recording interpreter: CPython 3.12 changed builtin
        # sum() on floats to Neumaier summation, so 3.11 replays diverge by
        # one ulp wherever a trajectory consults a float sum(). The
        # summation-portability pass (left-fold sums in trajectory paths)
        # will lift this pin.
        python-version: "3.13"
    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -e . pytest
    - name: Replay transition vectors + PRNG parity
      env:
        HUMPDAY_FORCE_PURE_ARRAY: "1"
      run: |
        pytest tests/test_transition_vectors.py tests/test_prng_parity.py tests/test_portable_rng_mode.py -q

  test-minimal:
    runs-on: ubuntu-latest
    name: Test minimal dependencies
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .  # Only core dependencies

    - name: Test core functionality
      run: |
        python -c "import humpday; print('Import successful')"
        python -c "from humpday import minimize, suggest; print('Core functions available')"