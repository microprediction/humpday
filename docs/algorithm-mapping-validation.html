            margin: 0 auto;

            box-shadow: 0 4px 8px rgba(0,0,0,0.1);

            border-radius: 5px;

        .test-warn { border-left: 4px solid #f39c12; }

        .validation-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;

            padding: 8px 12px;
            border: 1px solid #ddd;
            text-align: left;
            font-size: 0.85em;

            background: #34495e;
            color: white;
        }

        .status-warning { background: #fff3cd; }

        .run-tests-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;

        function addValidationResult(testName, status, message, details = '') {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');

            const statusClass = status === 'pass' ? 'test-pass' : status === 'fail' ? 'test-fail' : 'test-warn';
            const statusIcon = status === 'pass' ? '✅' : status === 'fail' ? '❌' : '⚠️';

            resultDiv.className = `test-results ${statusClass}`;
            resultDiv.innerHTML = `
                <div><strong>${statusIcon} ${testName}</strong></div>
                <div><strong>Status:</strong> ${message}</div>
                ${details ? `<div style="margin-top: 10px; font-family: monospace; font-size: 0.8em; background: #f8f9fa; padding: 8px; border-radius: 4px;">${details}</div>` : ''}
            `;

            resultsDiv.appendChild(resultDiv);
        }

        function createValidationTable(data, title) {
            const resultsDiv = document.getElementById('test-results');
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'test-results';

            let tableHtml = `<h4>${title}</h4><table class="validation-table">`;

            if (data.length > 0) {
                const headers = Object.keys(data[0]);
                tableHtml += '<thead><tr>';
                headers.forEach(header => {
                    tableHtml += `<th>${header}</th>`;
                });
                tableHtml += '</tr></thead><tbody>';

                data.forEach(row => {
                    tableHtml += '<tr>';
                    headers.forEach(header => {
                        const cellClass = row.Status === 'OK' ? 'status-ok' :
                                         row.Status === 'ERROR' ? 'status-error' :
                                         row.Status === 'WARNING' ? 'status-warning' : '';
                        tableHtml += `<td class="${cellClass}">${row[header] || ''}</td>`;
                    });
                    tableHtml += '</tr>';
                });
            } else {
                tableHtml += '<tbody><tr><td colspan="100%">No data</td></tr>';
            }

            tableHtml += '</tbody></table>';
            sectionDiv.innerHTML = tableHtml;
            resultsDiv.appendChild(sectionDiv);
        }

        function runMappingValidation() {
            clearResults();

            console.log('Running algorithm mapping validation...');

            // Test 1: Validate optimizer configuration completeness
            const optimizerValidation = [];
            let optimizerErrors = 0;

            for (const optimizer of optimizers) {
                const validation = {
                    'Algorithm Name': optimizer.name,
                    'Internal Name': optimizer.internalName || 'MISSING',
                    'Status': 'OK',
                    'Issues': ''
                };

                const issues = [];

                if (!optimizer.name) {
                    issues.push('Missing display name');
                    validation.Status = 'ERROR';
                }

                if (!optimizer.internalName) {
                    issues.push('Missing internal name');
                    validation.Status = 'ERROR';
                }

                if (!optimizer.elo) {
                    issues.push('Missing ELO rating');
                    validation.Status = 'WARNING';
                }

                if (issues.length > 0) {
                    validation.Issues = issues.join('; ');
                    if (validation.Status === 'ERROR') optimizerErrors++;
                }

                optimizerValidation.push(validation);
            }

            createValidationTable(optimizerValidation, '📋 Optimizer Configuration Validation');

            if (optimizerErrors === 0) {
                addValidationResult('Optimizer Configuration', 'pass', 'All optimizers have complete configuration');
            } else {
                addValidationResult('Optimizer Configuration', 'fail', `${optimizerErrors} optimizers have configuration errors`);
            }

            // Test 2: Validate OptimizerFactory compatibility
            const factoryValidation = [];
            let factoryErrors = 0;

            for (const optimizer of optimizers) {
                if (!optimizer.internalName) continue;

                const validation = {
                    'Internal Name': optimizer.internalName,
                    'Factory Support': 'OK',
                    'Class Exists': 'OK',
                    'Status': 'OK',
                    'Issues': ''
                };

                const issues = [];

                try {
                    // Test if OptimizerFactory can create the optimizer
                    const testFunc = (x) => x[0] * x[0];
                    const opt = OptimizerFactory.create(optimizer.internalName, testFunc, 10, 1);
                    if (!opt) {
                        issues.push('Factory returned null');
                        validation['Factory Support'] = 'ERROR';
                        validation.Status = 'ERROR';
                    }
                } catch (error) {
                    issues.push(`Factory error: ${error.message}`);
                    validation['Factory Support'] = 'ERROR';
                    validation.Status = 'ERROR';
                    factoryErrors++;
                }

                if (issues.length > 0) {
                    validation.Issues = issues.join('; ');
                }

                factoryValidation.push(validation);
            }

            createValidationTable(factoryValidation, '🏭 OptimizerFactory Compatibility');

            if (factoryErrors === 0) {
                addValidationResult('OptimizerFactory Compatibility', 'pass', 'All optimizers can be created by factory');
            } else {
                addValidationResult('OptimizerFactory Compatibility', 'fail', `${factoryErrors} optimizers cannot be created by factory`);
            }

            // Test 3: Validate algorithmInfo mapping
            const infoValidation = [];
            let infoErrors = 0;

            for (const optimizer of optimizers) {
                const validation = {
                    'Algorithm Name': optimizer.name,
                    'Has Info': 'OK',
                    'Has Paper': 'OK',
                    'Has Reference': 'OK',
                    'Has Python': 'OK',
                    'Has JS': 'OK',
                    'Status': 'OK',
                    'Issues': ''
                };

                const issues = [];
                const info = algorithmInfo[optimizer.name];

                if (!info) {
                    issues.push('No algorithmInfo entry');
                    validation['Has Info'] = 'ERROR';
                    validation.Status = 'ERROR';
                    infoErrors++;
                } else {
                    if (!info.paper) {
                        issues.push('Missing paper link');
                        validation['Has Paper'] = 'WARNING';
                    }

                    if (!info.referenceImpl) {
                        issues.push('Missing reference implementation');
                        validation['Has Reference'] = 'WARNING';
                    }

                    if (!info.humpdayPython) {
                        issues.push('Missing Python wrapper link');
                        validation['Has Python'] = 'WARNING';
                    }

                    if (!info.humpdayJS) {
                        issues.push('Missing JS implementation link');
                        validation['Has JS'] = 'WARNING';
                    }
                }

                if (issues.length > 0) {
                    validation.Issues = issues.join('; ');
                    if (validation.Status === 'OK') validation.Status = 'WARNING';
                }

                infoValidation.push(validation);
            }

            createValidationTable(infoValidation, '📖 Algorithm Info Mapping');

            if (infoErrors === 0) {
                addValidationResult('Algorithm Info Mapping', 'pass', 'All optimizers have algorithmInfo entries');
            } else {
                addValidationResult('Algorithm Info Mapping', 'fail', `${infoErrors} optimizers missing algorithmInfo`);
            }

            // Test 4: Check for orphaned algorithmInfo entries
            const infoKeys = Object.keys(algorithmInfo);
            const optimizerNames = optimizers.map(opt => opt.name);
            const orphanedEntries = infoKeys.filter(key => !optimizerNames.includes(key));

            if (orphanedEntries.length > 0) {
                addValidationResult('Orphaned Info Entries', 'warn',
                    `${orphanedEntries.length} algorithmInfo entries have no matching optimizer`,
                    `Orphaned entries: ${orphanedEntries.join(', ')}`);
            } else {
                addValidationResult('Orphaned Info Entries', 'pass', 'No orphaned algorithmInfo entries found');
            }

            // Summary
            const totalOptimizers = optimizers.length;
            const totalErrors = optimizerErrors + factoryErrors + infoErrors;

            if (totalErrors === 0) {
                addValidationResult('Overall Validation', 'pass',
                    `All ${totalOptimizers} optimizers passed validation checks`);
            } else {
                addValidationResult('Overall Validation', 'fail',
                    `${totalErrors} critical errors found across ${totalOptimizers} optimizers`);
            }

            console.log('Validation complete');
        }
